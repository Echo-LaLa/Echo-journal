<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#090719" />
  <title>Echo·浮光手记</title>
  <style>
    :root{--bg:#090719;--panel:rgba(25,20,53,.78);--line:rgba(204,188,255,.14);--text:#f5f0ff;--muted:#aaa0c8;--violet:#9e78ff;--pink:#ec8cd5;--cyan:#85dfe0}*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:radial-gradient(circle at 80px 80px,#32255f 0,transparent 31%),radial-gradient(circle at 90% 22%,#20275d 0,transparent 24%),linear-gradient(165deg,#090719,#100b25 60%,#080616);overflow-x:hidden}.stars,.stars:before{position:fixed;inset:0;pointer-events:none;content:"";background-image:radial-gradient(#fff 1px,transparent 1px);background-size:47px 47px;opacity:.16}.stars:before{transform:translate(15px,20px);background-size:79px 79px;opacity:.35}.app{width:min(100%,480px);min-height:100vh;margin:auto;padding:calc(22px + env(safe-area-inset-top)) 18px calc(100px + env(safe-area-inset-bottom));position:relative}.top{display:flex;justify-content:space-between;align-items:flex-start}.eyebrow{font-size:12px;letter-spacing:3px;color:#b8a8dc}.brand{margin:5px 0 0;font-family:Georgia,"Songti SC",serif;font-size:30px;font-weight:500;letter-spacing:4px}.moon{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#fff8df,#ba9cff);box-shadow:0 0 30px #a27eff77;position:relative}.moon:after{content:"";position:absolute;width:42px;height:42px;border-radius:50%;background:#12102d;left:-8px;top:-6px}.quote{margin:28px 0 18px;padding:18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(135deg,rgba(154,119,255,.15),rgba(59,43,97,.18));backdrop-filter:blur(14px)}.quote b{font:500 18px/1.7 Georgia,"Songti SC",serif}.quote small{display:block;margin-top:8px;color:var(--muted)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.new{grid-column:1/-1;border:0;border-radius:18px;padding:16px;color:white;font-size:16px;font-weight:700;background:linear-gradient(110deg,#7657e9,#c26cda);box-shadow:0 10px 28px #6c4adc44}.search,.filter{min-width:0;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(11,9,28,.65);color:var(--text);outline:none}.filter option{background:#17112e}.section-head{display:flex;align-items:center;justify-content:space-between;margin:28px 2px 12px}.section-head h2{font-size:15px;letter-spacing:2px;margin:0}.count{font-size:12px;color:var(--muted)}.entries{display:grid;gap:12px}.card{position:relative;padding:16px;border-radius:20px;border:1px solid var(--line);background:var(--panel);box-shadow:0 12px 28px #0003;overflow:hidden}.card:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--accent)}.meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px}.tag{color:var(--accent)}.card h3{font-size:17px;margin:10px 0 7px}.card p{margin:0;color:#d5cde8;line-height:1.65;font-size:14px;white-space:pre-wrap}.empty{text-align:center;padding:52px 16px;border:1px dashed var(--line);border-radius:22px;color:var(--muted)}.empty .orb{font-size:36px;margin-bottom:12px}.dock{position:fixed;z-index:5;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(calc(100% - 28px),450px);padding:10px 16px;border:1px solid var(--line);border-radius:23px;background:rgba(15,11,36,.9);backdrop-filter:blur(18px);display:flex;justify-content:space-around;color:var(--muted);font-size:12px}.dock span{display:grid;gap:3px;text-align:center}.dock i{font-style:normal;font-size:19px}.modal{position:fixed;z-index:10;inset:0;padding:18px;display:none;align-items:flex-end;justify-content:center;background:#03020bb5}.modal.open{display:flex}.sheet{width:min(100%,480px);max-height:88vh;overflow:auto;padding:20px;border:1px solid var(--line);border-radius:26px;background:#15102d;box-shadow:0 -20px 60px #0008}.sheet h2{margin:0 0 18px;font:500 24px Georgia,"Songti SC",serif}.field{display:grid;gap:7px;margin:13px 0}.field label{font-size:12px;color:var(--muted)}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:#0d0a20;color:white;font:inherit;outline:none}.field textarea{min-height:140px;resize:vertical}.buttons{display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-top:16px}.buttons button{border:0;border-radius:14px;padding:14px;color:white;font-weight:700}.cancel{background:#2a2341}.save{background:linear-gradient(110deg,#7657e9,#c26cda)}@media(min-width:700px){body{padding:24px 0}.app{min-height:calc(100vh - 48px);border:1px solid var(--line);border-radius:32px;background:#09071988}}
  </style>
</head>
<body><div class="stars"></div><main class="app"><header class="top"><div><div class="eyebrow">DREAM · LIFE · WORK</div><h1 class="brand">Echo·浮光手记</h1></div><div class="moon"></div></header><section class="quote"><b>把散落在夜里的光，<br>轻轻收进今天。</b><small id="today"></small></section><section class="actions"><button class="new" id="newBtn">＋ 记录此刻</button><input class="search" id="search" placeholder="搜索记忆…"><select class="filter" id="filter"><option value="all">全部分类</option><option value="梦境">梦境</option><option value="生活">生活</option><option value="工作">工作</option><option value="纪念">值得纪念</option></select></section><div class="section-head"><h2>✦ 最近的星光</h2><span class="count" id="count"></span></div><section class="entries" id="entries"></section></main><nav class="dock"><span><i>☾</i>手记</span><span><i>✦</i>梦境</span><span><i>⌁</i>生活</span><span><i>♢</i>纪念</span></nav><div class="modal" id="modal"><form class="sheet" id="form"><h2>记录一束浮光</h2><div class="field"><label>日期</label><input type="date" id="date" required></div><div class="field"><label>分类</label><select id="category"><option>梦境</option><option>生活</option><option>工作</option><option>纪念</option></select></div><div class="field"><label>标题</label><input id="title" maxlength="40" placeholder="给这段记忆一个名字" required></div><div class="field"><label>内容</label><textarea id="content" maxlength="1500" placeholder="写下梦里的画面、今天的心情，或值得记住的瞬间……" required></textarea></div><div class="buttons"><button type="button" class="cancel" id="cancel">取消</button><button class="save">保存记忆</button></div></form></div><script>
const KEY='fuguang-journal-v1',colors={'梦境':'#a98cff','生活':'#85dfe0','工作':'#edbb78','纪念':'#ec8cd5'};let data=JSON.parse(localStorage.getItem(KEY)||'[]');const $=id=>document.getElementById(id);$('today').textContent=new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(new Date());function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function render(){let q=$('search').value.trim().toLowerCase(),f=$('filter').value,rows=data.filter(x=>(f==='all'||x.category===f)&&(!q||(x.title+x.content).toLowerCase().includes(q))).sort((a,b)=>b.date.localeCompare(a.date));$('count').textContent=rows.length+' 条记忆';$('entries').innerHTML=rows.length?rows.map(x=>`<article class="card" style="--accent:${colors[x.category]}"><div class="meta"><span class="tag">${esc(x.category)}</span><time>${esc(x.date)}</time></div><h3>${esc(x.title)}</h3><p>${esc(x.content)}</p></article>`).join(''):'<div class="empty"><div class="orb">☾</div>这里还很安静。<br>写下第一段属于你的星光吧。</div>'}$('newBtn').onclick=()=>{$('date').value=new Date().toISOString().slice(0,10);$('modal').classList.add('open');$('title').focus()};$('cancel').onclick=()=>$('modal').classList.remove('open');$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('open')};$('form').onsubmit=e=>{e.preventDefault();data.push({id:Date.now(),date:$('date').value,category:$('category').value,title:$('title').value.trim(),content:$('content').value.trim()});localStorage.setItem(KEY,JSON.stringify(data));e.target.reset();$('modal').classList.remove('open');render()};$('search').oninput=render;$('filter').onchange=render;render();
</script></body></html>
